<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İşletme Defteri - Düzenlenmiş Sürüm</title>
    <style>
        :root { --bg: #f4f7f6; --cont: white; --txt: #333; --brd: #eee; --head: #f8f9fa; --sum-bg: #000; --sum-txt: #fff; }
        [data-theme="dark"] { --bg: #18191a; --cont: #242526; --txt: #e4e6eb; --brd: #3a3b3c; --head: #3a3b3c; --sum-bg: #000; --sum-txt: #fff; }
        
        body { font-family: 'Segoe UI', sans-serif; margin: 20px; background-color: var(--bg); color: var(--txt); transition: 0.2s; }
        .container { max-width: 1000px; margin: auto; background: var(--cont); padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        /* Üst Başlık Bölümü Düzenlendi */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 15px; }
        h1 { margin: 0; font-size: 1.8em; flex-grow: 1; }
        
        .header-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .btn-exp { padding: 8px 12px; border-radius: 6px; border: none; cursor: pointer; color: white; font-weight: bold; font-size: 12px; background: #1d6f42; white-space: nowrap; }
        .btn-imp { background: #1a73e8; }
        
        .filters { display: flex; gap: 5px; }
        select { padding: 8px; border-radius: 6px; border: 1px solid var(--brd); background: var(--cont); color: var(--txt); font-size: 12px; font-weight: bold; cursor: pointer; }

        .theme-container { display: flex; align-items: center; gap: 5px; background: rgba(0,0,0,0.05); padding: 5px 10px; border-radius: 20px; }
        .sw { width: 34px; height: 18px; position: relative; display: inline-block; }
        .sw input { display:none; }
        .sld { background:#ccc; position:absolute; top:0; left:0; right:0; bottom:0; cursor:pointer; border-radius:18px; transition:.4s; }
        .sld:before { background:white; content:""; height:12px; width:12px; left:3px; bottom:3px; position:absolute; transition:.4s; border-radius:50%; }
        input:checked + .sld { background:#1a73e8; }
        input:checked + .sld:before { transform:translateX(16px); }

        .entry-grid { display: grid; grid-template-columns: 120px 1fr 120px 120px 80px; gap: 10px; margin-bottom: 25px; align-items: end; }
        .input-group { display: flex; flex-direction: column; }
        label { font-size: 11px; font-weight: bold; margin-bottom: 5px; opacity: 0.7; }
        input { padding: 10px; border: 2px solid var(--brd); border-radius: 8px; outline: none; background: var(--cont); color: var(--txt); width: 100%; box-sizing: border-box; }
        #desc { text-transform: capitalize; }
        .in-exp { border-left: 4px solid #dc3545; text-align: right; } 
        .in-inc { border-left: 4px solid #28a745; text-align: right; }
        .add-btn { width: 100%; padding: 11px; background: #1a73e8; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--brd); }
        th { background: var(--head); font-size: 13px; }
        .txt-exp { color: #ff6b6b; font-weight: bold; text-align: right; } 
        .txt-inc { color: #51cf66; font-weight: bold; text-align: right; }
        .col-right { text-align: right; }
        
        .sum-box { margin-top: 20px; padding: 20px; background: var(--sum-bg); border-radius: 10px; text-align: right; font-size: 1.6em; color: var(--sum-txt); font-weight: bold; }
        .pos { color: #4ade80 !important; } .neg { color: #ff6b6b !important; }
        
        .acts { display: flex; gap: 10px; } .acts button { cursor: pointer; border: none; background: none; font-weight: 600; font-size: 13px; }
        .e-btn { color: #1a73e8; } .d-btn { color: #dc3545; }
        #fileInput { display: none; }
        .btn-bulk-del { background: #dc3545; color: white; padding: 5px 10px; border-radius: 4px; border: none; cursor: pointer; font-size: 11px; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar">
        <h1>İşletme Defteri</h1>
        <div class="header-actions">
            <div class="filters">
                <select id="typeFilter" onchange="render()"><option value="all">Hepsi</option><option value="income">Gelirler</option><option value="expense">Giderler</option></select>
                <select id="yearFilter" onchange="render()"><option value="all">Tüm Yıllar</option></select>
            </div>
            <button class="btn-exp" onclick="exportData()">Dışa Aktar</button>
            <button class="btn-exp btn-imp" onclick="document.getElementById('fileInput').click()">İçe Aktar</button>
            <input type="file" id="fileInput" accept=".csv" onchange="importData(event)">
            <div class="theme-container"><span>☀️</span><label class="sw"><input type="checkbox" id="tgl"><div class="sld"></div></label><span>🌙</span></div>
        </div>
    </div>
    
    <div class="entry-grid">
        <div class="input-group"><label>Tarih</label><input type="text" id="date" maxlength="10"></div>
        <div class="input-group"><label>Açıklama</label><input type="text" id="desc"></div>
        <div class="input-group"><label style="color:#dc3545">Gider (-)</label><input type="text" id="expense" class="in-exp" placeholder="0,00" oninput="maskMoney(this)"></div>
        <div class="input-group"><label style="color:#28a745">Gelir (+)</label><input type="text" id="income" class="in-inc" placeholder="0,00" oninput="maskMoney(this)"></div>
        <button class="add-btn" id="addBtn">Ekle</button>
    </div>

    <button id="bulkDelBtn" class="btn-bulk-del" onclick="bulkDelete()">Seçilenleri Sil</button>

    <table id="table">
        <thead>
            <tr><th style="width:30px"><input type="checkbox" id="selectAll" onclick="toggleSelectAll(this)"></th><th>Tarih</th><th>Açıklama</th><th class="col-right">Gider</th><th class="col-right">Gelir</th><th>İşlem</th></tr>
        </thead>
        <tbody></tbody>
    </table>

    <div class="sum-box">Görünür Bakiye: <span id="total">0,00</span> TL</div>
</div>

<script>
    let data = JSON.parse(localStorage.getItem('defter')) || [];

    window.onload = () => {
        if (localStorage.getItem('th') === 'dark') { document.documentElement.setAttribute('data-theme', 'dark'); document.getElementById('tgl').checked = true; }
        document.getElementById('date').value = new Date().toLocaleDateString('tr-TR');
        updateYearFilter(); render(); 
        document.getElementById('date').focus(); document.getElementById('date').select();
    };

    document.getElementById('tgl').onchange = (e) => {
        const th = e.target.checked ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', th);
        localStorage.setItem('th', th);
    };

    function maskMoney(el) {
        let v = el.value.replace(/\D/g, "");
        v = (v / 100).toFixed(2).replace(".", ",");
        v = v.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        el.value = v;
    }

    function unmaskMoney(val) {
        if (!val) return 0;
        return parseFloat(val.replace(/\./g, "").replace(",", ".")) || 0;
    }

    const ids = ['date', 'desc', 'expense', 'income'];
    ids.forEach((id, idx) => {
        const el = document.getElementById(id);
        el.onkeydown = (e) => {
            if (e.key === "Enter") {
                e.preventDefault();
                if (id === 'date' && el.value.length > 0 && el.value.length <= 2) {
                    const n = new Date(); el.value = el.value.padStart(2,'0') + '.' + String(n.getMonth()+1).padStart(2,'0') + '.' + n.getFullYear();
                }
                if (idx === ids.length - 1) pEntry();
                else { const t = document.getElementById(ids[idx+1]); t.focus(); t.select(); }
            }
        };
    });

    document.getElementById('date').oninput = (e) => {
        let v = e.target.value.replace(/\D/g, '').slice(0, 8);
        if (v.length >= 5) e.target.value = v.slice(0, 2) + '.' + v.slice(2, 4) + '.' + v.slice(4);
        else if (v.length >= 3) e.target.value = v.slice(0, 2) + '.' + v.slice(2);
        else e.target.value = v;
    };

    function pEntry() {
        const d = document.getElementById('date').value, deRaw = document.getElementById('desc').value;
        const ex = unmaskMoney(document.getElementById('expense').value);
        const inc = unmaskMoney(document.getElementById('income').value);

        if (d.length < 10 || !deRaw || (ex === 0 && inc === 0)) return alert("Eksik bilgi!");
        
        const de = deRaw.charAt(0).toUpperCase() + deRaw.slice(1);
        const p = d.split('.');
        data.push({ id: Date.now(), d, ts: new Date(p[2], p[1]-1, p[0]).getTime(), de, ex, in: inc });
        updateYearFilter(); save();
        document.getElementById('desc').value = ''; document.getElementById('expense').value = ''; document.getElementById('income').value = '';
        document.getElementById('date').focus(); document.getElementById('date').select();
    }

    function save() { 
        data.sort((a, b) => b.ts - a.ts); 
        localStorage.setItem('defter', JSON.stringify(data)); 
        render(); 
    }

    function updateYearFilter() {
        const filter = document.getElementById('yearFilter');
        const currentSelection = filter.value;
        const years = [...new Set(data.map(i => {
            const p = i.d.split('.');
            return p[2];
        }).filter(y => y))].sort((a, b) => b - a);
        
        filter.innerHTML = '<option value="all">Tüm Yıllar</option>';
        years.forEach(y => { filter.innerHTML += `<option value="${y}">${y} Yılı</option>`; });
        filter.value = currentSelection;
    }

    function render() {
        const tb = document.querySelector('#table tbody'); tb.innerHTML = '';
        const selectedYear = document.getElementById('yearFilter').value;
        const selectedType = document.getElementById('typeFilter').value;
        
        let filteredData = data;
        if (selectedYear !== 'all') filteredData = filteredData.filter(i => i.d.split('.')[2] === selectedYear);
        if (selectedType === 'income') filteredData = filteredData.filter(i => i.in > 0);
        else if (selectedType === 'expense') filteredData = filteredData.filter(i => i.ex > 0);

        let tot = filteredData.reduce((a, c) => a + c.in - c.ex, 0);
        filteredData.forEach(i => {
            const r = tb.insertRow();
            r.insertCell(0).innerHTML = `<input type="checkbox" class="row-check" value="${i.id}" onclick="updateBulkBtn()">`;
            r.insertCell(1).innerText = i.d; r.insertCell(2).innerText = i.de;
            const cE = r.insertCell(3); cE.innerText = i.ex ? "-" + i.ex.toLocaleString('tr-TR', {minimumFractionDigits:2}) : "-"; cE.className = "txt-exp";
            const cI = r.insertCell(4); cI.innerText = i.in ? "+" + i.in.toLocaleString('tr-TR', {minimumFractionDigits:2}) : "-"; cI.className = "txt-inc";
            r.insertCell(5).innerHTML = `<div class="acts"><button class="e-btn" onclick="edit(${i.id})">Düzelt</button><button class="d-btn" onclick="del(${i.id})">Sil</button></div>`;
        });
        const totalEl = document.getElementById('total');
        totalEl.innerText = tot.toLocaleString('tr-TR', {minimumFractionDigits: 2});
        totalEl.className = tot >= 0 ? 'pos' : 'neg';
        updateBulkBtn();
    }

    function del(id) { if(confirm("Silinsin mi?")) { data = data.filter(e => e.id !== id); updateYearFilter(); save(); } }
    
    function edit(id) {
        const i = data.find(e => e.id === id);
        document.getElementById('date').value = i.d; 
        document.getElementById('desc').value = i.de;
        const expIn = document.getElementById('expense'), incIn = document.getElementById('income');
        expIn.value = i.ex ? (i.ex * 100).toFixed(0) : ""; if(i.ex) maskMoney(expIn);
        incIn.value = i.in ? (i.in * 100).toFixed(0) : ""; if(i.in) maskMoney(incIn);
        data = data.filter(e => e.id !== id); save();
        document.getElementById('date').focus(); document.getElementById('date').select();
    }

    function toggleSelectAll(source) {
        document.querySelectorAll('.row-check').forEach(cb => cb.checked = source.checked);
        updateBulkBtn();
    }

    function updateBulkBtn() {
        const checkedCount = document.querySelectorAll('.row-check:checked').length;
        document.getElementById('bulkDelBtn').style.display = checkedCount > 0 ? 'block' : 'none';
        document.getElementById('bulkDelBtn').innerText = `Seçilenleri Sil (${checkedCount})`;
    }

    function bulkDelete() {
        const selectedIds = Array.from(document.querySelectorAll('.row-check:checked')).map(cb => parseFloat(cb.value));
        if(confirm(`${selectedIds.length} kaydı silmek istediğinize emin misiniz?`)) {
            data = data.filter(e => !selectedIds.includes(e.id));
            updateYearFilter(); save();
        }
    }

    function exportData() {
        if (data.length === 0) return alert("Veri yok!");
        let csv = "\uFEFFTarih;Açıklama;Gider;Gelir\n";
        data.forEach(e => { csv += `${e.d};${e.de};${e.ex};${e.in}\n`; });
        const now = new Date();
        const timeStr = `${String(now.getDate()).padStart(2,'0')}-${String(now.getMonth()+1).padStart(2,'0')}-${now.getFullYear()}-${String(now.getHours()).padStart(2,'0')}-${String(now.getMinutes()).padStart(2,'0')}`;
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `isletmedefterim-${timeStr}.csv`; a.click();
    }

    function importData(event) {
        const file = event.target.files[0];
        if (!file) return;
        if(confirm("Mevcut veriler silinecek ve dosyadaki veriler yüklenecektir?")) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const newData = [];
                const rows = e.target.result.split('\n').slice(1);
                rows.forEach(row => {
                    if (row.trim()) {
                        const [d, de, ex, inc] = row.split(';');
                        const p = d ? d.split('.') : [];
                        if(p.length === 3) {
                            newData.push({ id: Date.now() + Math.random(), d, ts: new Date(p[2], p[1]-1, p[0]).getTime(), de, ex: parseFloat(ex) || 0, in: parseFloat(inc) || 0 });
                        }
                    }
                });
                data = newData; updateYearFilter(); save();
            };
            reader.readAsText(file);
        }
    }

    document.getElementById('addBtn').onclick = pEntry;
</script>
</body>
</html>
