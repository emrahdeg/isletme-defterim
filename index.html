<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>İşletme Defteri v1.0</title>
    <style>
        :root { --bg: #f4f7f6; --cont: white; --txt: #333; --brd: #eee; --head: #f8f9fa; --sum-bg: #000; --sum-txt: #fff; }
        [data-theme="dark"] { --bg: #18191a; --cont: #242526; --txt: #e4e6eb; --brd: #3a3b3c; --head: #3a3b3c; --sum-bg: #000; --sum-txt: #fff; }
        body { font-family: 'Segoe UI', sans-serif; margin: 10px; background-color: var(--bg); color: var(--txt); transition: 0.2s; }
        .container { max-width: 1000px; margin: auto; background: var(--cont); padding: 15px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        h1 { margin: 0; font-size: 1.4em; width: 100%; text-align: center; }
        .header-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; width: 100%; justify-content: center; }
        .btn-exp { padding: 10px; border-radius: 6px; border: none; cursor: pointer; color: white; font-weight: bold; font-size: 11px; background: #1d6f42; }
        .btn-imp { background: #1a73e8; }
        .filters { display: flex; gap: 5px; }
        select { padding: 8px; border-radius: 6px; border: 1px solid var(--brd); background: var(--cont); color: var(--txt); font-size: 11px; }
        .theme-container { display: flex; align-items: center; gap: 5px; background: rgba(0,0,0,0.05); padding: 5px 10px; border-radius: 20px; }
        .sw { width: 34px; height: 18px; position: relative; display: inline-block; }
        .sw input { display:none; }
        .sld { background:#ccc; position:absolute; top:0; left:0; right:0; bottom:0; cursor:pointer; border-radius:18px; transition:.4s; }
        .sld:before { background:white; content:""; height:12px; width:12px; left:3px; bottom:3px; position:absolute; transition:.4s; border-radius:50%; }
        input:checked + .sld { background:#1a73e8; }
        input:checked + .sld:before { transform:translateX(16px); }
        .entry-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 20px; }
        @media (min-width: 768px) {
            .entry-grid { grid-template-columns: 120px 1fr 120px 120px 80px; align-items: end; }
            h1 { width: auto; text-align: left; }
            .header-actions { width: auto; justify-content: flex-end; }
            body { margin: 20px; } .container { padding: 25px; }
        }
        .input-group { display: flex; flex-direction: column; }
        label { font-size: 11px; font-weight: bold; margin-bottom: 5px; opacity: 0.7; }
        input { padding: 12px; border: 2px solid var(--brd); border-radius: 8px; outline: none; background: var(--cont); color: var(--txt); width: 100%; box-sizing: border-box; font-size: 16px; }
        .in-exp { border-left: 4px solid #dc3545; text-align: right; } .in-inc { border-left: 4px solid #28a745; text-align: right; }
        .add-btn { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .table-responsive { width: 100%; overflow-x: auto; margin-top: 10px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--brd); font-size: 14px; }
        th { background: var(--head); white-space: nowrap; }
        .txt-exp { color: #ff6b6b; font-weight: bold; text-align: right; } .txt-inc { color: #51cf66; font-weight: bold; text-align: right; }
        .sum-box { margin-top: 20px; padding: 20px; background: var(--sum-bg); border-radius: 10px; text-align: right; font-size: 1.4em; color: var(--sum-txt); font-weight: bold; }
        .pos { color: #4ade80 !important; } .neg { color: #ff6b6b !important; }
        .btn-bulk-del { background: #dc3545; color: white; padding: 8px; border-radius: 6px; border: none; cursor: pointer; width: 100%; margin-bottom: 10px; display: none; }
        @media (min-width: 768px) { .btn-bulk-del { width: auto; } }
        #fileInput { display: none; }
    </style>
</head>
<body>
<div class="container">
    <div class="top-bar">
        <h1>İşletme Defteri</h1>
        <div class="header-actions">
            <div class="filters">
                <select id="typeFilter" onchange="render()"><option value="all">Hepsi</option><option value="income">Gelirler</option><option value="expense">Giderler</option></select>
                <select id="yearFilter" onchange="render()"><option value="all">Tüm Yıllar</option></select>
            </div>
            <button class="btn-exp" onclick="exportData()">Dışa Aktar</button>
            <button class="btn-exp btn-imp" onclick="document.getElementById('fileInput').click()">İçe Aktar</button>
            <input type="file" id="fileInput" accept=".csv" onchange="importData(event)">
            <div class="theme-container">☀️<label class="sw"><input type="checkbox" id="tgl"><div class="sld"></div></label>🌙</div>
        </div>
    </div>
    <div class="entry-grid">
        <div class="input-group"><label>Tarih</label><input type="text" id="date" maxlength="10"></div>
        <div class="input-group"><label>Açıklama</label><input type="text" id="desc"></div>
        <div class="input-group"><label style="color:#dc3545">Gider (-)</label><input type="text" id="expense" class="in-exp" placeholder="0,00" oninput="maskMoney(this)"></div>
        <div class="input-group"><label style="color:#28a745">Gelir (+)</label><input type="text" id="income" class="in-inc" placeholder="0,00" oninput="maskMoney(this)"></div>
        <button class="add-btn" id="addBtn" onclick="pEntry()">Ekle</button>
    </div>
    <button id="bulkDelBtn" class="btn-bulk-del" onclick="bulkDelete()">Seçilenleri Sil</button>
    <div class="table-responsive">
        <table id="table">
            <thead>
                <tr><th><input type="checkbox" id="selectAll" onclick="toggleSelectAll(this)"></th><th>Tarih</th><th>Açıklama</th><th style="text-align:right">Gider</th><th style="text-align:right">Gelir</th><th>İşlem</th></tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
    <div class="sum-box">Bakiye: <span id="total">0,00</span> TL</div>
</div>

<script>
    let data = JSON.parse(localStorage.getItem('defter')) || [];
    const getTurkishDate = () => {
        const n = new Date();
        return `${String(n.getDate()).padStart(2,'0')}.${String(n.getMonth()+1).padStart(2,'0')}.${n.getFullYear()}`;
    };

    window.onload = () => {
        if (localStorage.getItem('th') === 'dark') { document.documentElement.setAttribute('data-theme', 'dark'); document.getElementById('tgl').checked = true; }
        document.getElementById('date').value = getTurkishDate();
        updateYearFilter(); render();
    };

    document.getElementById('tgl').onchange = (e) => {
        const th = e.target.checked ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', th);
        localStorage.setItem('th', th);
    };

    function maskMoney(el) {
        let v = el.value.replace(/\D/g, "");
        v = (v / 100).toFixed(2).replace(".", ",");
        v = v.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        el.value = v;
    }

    const unmask = (v) => parseFloat(v.replace(/\./g, "").replace(",", ".")) || 0;

    const ids = ['date', 'desc', 'expense', 'income'];
    ids.forEach((id, idx) => {
        const el = document.getElementById(id);
        el.onkeydown = (e) => {
            if (e.key === "Enter") {
                e.preventDefault();
                if (id === 'date' && el.value.length > 0 && el.value.length <= 2) {
                    const n = new Date(); el.value = el.value.padStart(2,'0') + '.' + String(n.getMonth()+1).padStart(2,'0') + '.' + n.getFullYear();
                }
                if (idx === ids.length - 1) pEntry();
                else { const t = document.getElementById(ids[idx+1]); t.focus(); t.select(); }
            }
        };
    });

    document.getElementById('date').oninput = (e) => {
        let v = e.target.value.replace(/\D/g, '').slice(0, 8);
        if (v.length >= 5) e.target.value = v.slice(0, 2) + '.' + v.slice(2, 4) + '.' + v.slice(4);
        else if (v.length >= 3) e.target.value = v.slice(0, 2) + '.' + v.slice(2);
        else e.target.value = v;
    };

    function pEntry() {
        let d = document.getElementById('date').value;
        const de = document.getElementById('desc').value;
        const ex = unmask(document.getElementById('expense').value);
        const inc = unmask(document.getElementById('income').value);
        if (d.split('.').length !== 3 || !de || (ex === 0 && inc === 0)) return alert("Hatalı giriş!");
        data.push({ id: Date.now(), d, ts: new Date(d.split('.')[2], d.split('.')[1]-1, d.split('.')[0]).getTime(), de: de.charAt(0).toUpperCase() + de.slice(1), ex, in: inc });
        save();
        document.getElementById('desc').value = ''; document.getElementById('expense').value = ''; document.getElementById('income').value = '';
        document.getElementById('date').value = getTurkishDate(); document.getElementById('date').focus();
    }

    const save = () => { data.sort((a, b) => b.ts - a.ts); localStorage.setItem('defter', JSON.stringify(data)); updateYearFilter(); render(); };

    function render() {
        const tb = document.querySelector('#table tbody'); tb.innerHTML = '';
        const yF = document.getElementById('yearFilter').value;
        const tF = document.getElementById('typeFilter').value;
        let fD = data.filter(i => (yF === 'all' || i.d.split('.')[2] === yF) && (tF === 'all' || (tF === 'income' ? i.in > 0 : i.ex > 0)));
        let tot = fD.reduce((a, c) => a + c.in - c.ex, 0);
        fD.forEach(i => {
            const r = tb.insertRow();
            r.insertCell(0).innerHTML = `<input type="checkbox" class="row-check" value="${i.id}" onclick="updateBulkBtn()">`;
            r.insertCell(1).innerText = i.d; r.insertCell(2).innerText = i.de;
            const cE = r.insertCell(3); cE.innerText = i.ex ? i.ex.toLocaleString('tr-TR', {minimumFractionDigits:2}) : "-"; cE.className = "txt-exp";
            const cI = r.insertCell(4); cI.innerText = i.in ? i.in.toLocaleString('tr-TR', {minimumFractionDigits:2}) : "-"; cI.className = "txt-inc";
            r.insertCell(5).innerHTML = `<button onclick="edit(${i.id})" style="color:blue;border:none;background:none;cursor:pointer">Düzelt</button> <button onclick="del(${i.id})" style="color:red;border:none;background:none;cursor:pointer">Sil</button>`;
        });
        const tEl = document.getElementById('total'); tEl.innerText = tot.toLocaleString('tr-TR', {minimumFractionDigits: 2}); tEl.className = tot >= 0 ? 'pos' : 'neg';
        updateBulkBtn();
    }

    function updateYearFilter() {
        const f = document.getElementById('yearFilter'); const cur = f.value;
        const yrs = [...new Set(data.map(i => i.d.split('.')[2]))].sort((a,b) => b-a);
        f.innerHTML = '<option value="all">Tüm Yıllar</option>';
        yrs.forEach(y => f.innerHTML += `<option value="${y}">${y} Yılı</option>`);
        f.value = cur;
    }

    window.del = (id) => { if(confirm("Silinsin mi?")) { data = data.filter(e => e.id !== id); save(); } };
    window.edit = (id) => {
        const i = data.find(e => e.id === id);
        document.getElementById('date').value = i.d; document.getElementById('desc').value = i.de;
        const eI = document.getElementById('expense'); const nI = document.getElementById('income');
        eI.value = i.ex ? (i.ex * 100).toFixed(0) : ""; if(i.ex) maskMoney(eI);
        nI.value = i.in ? (i.in * 100).toFixed(0) : ""; if(i.in) maskMoney(nI);
        data = data.filter(e => e.id !== id); save();
    };

    window.toggleSelectAll = (s) => { document.querySelectorAll('.row-check').forEach(cb => cb.checked = s.checked); updateBulkBtn(); };
    window.updateBulkBtn = () => { const c = document.querySelectorAll('.row-check:checked').length; document.getElementById('bulkDelBtn').style.display = c > 0 ? 'block' : 'none'; document.getElementById('bulkDelBtn').innerText = `Seçilenleri Sil (${c})`; };
    window.bulkDelete = () => { const ids = Array.from(document.querySelectorAll('.row-check:checked')).map(cb => parseFloat(cb.value)); if(confirm("Silinsin mi?")) { data = data.filter(e => !ids.includes(e.id)); save(); } };

    window.exportData = () => {
        let csv = "\uFEFFTarih;Açıklama;Gider;Gelir\n";
        data.forEach(e => csv += `${e.d};${e.de};${e.ex};${e.in}\n`);
        const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
        const n = new Date(); a.download = `isletmedefterim-${n.getDate()}-${n.getMonth()+1}-${n.getFullYear()}.csv`; a.click();
    };

    window.importData = (ev) => {
        const f = ev.target.files[0]; if (!f) return;
        const r = new FileReader(); r.onload = (e) => {
            const rows = e.target.result.split('\n').slice(1); const nD = [];
            rows.forEach(row => { if (row.trim()) { const [d, de, ex, inc] = row.split(';'); const p = d.split('.'); if(p.length === 3) nD.push({ id: Date.now()+Math.random(), d, ts: new Date(p[2], p[1]-1, p[0]).getTime(), de, ex: parseFloat(ex)||0, in: parseFloat(inc)||0 }); } });
            if(confirm("Eskiler silinsin mi?")) data = nD; else data = [...data, ...nD]; save();
        }; r.readAsText(f);
    };
</script>
</body>
</html>
